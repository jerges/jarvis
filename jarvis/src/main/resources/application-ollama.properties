# Ollama-only profile
spring.autoconfigure.exclude=org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiImageAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration
# Ollama endpoint in your local network
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://192.168.1.44:11434}
# Default model (must exist in Ollama server: ollama pull <model>)
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:gemma4:latest}
spring.ai.ollama.chat.options.temperature=0.7
# Role-specific models
jarvis.ollama.orchestrator-model=${OLLAMA_ORCHESTRATOR_MODEL:gemma4:latest}
jarvis.ollama.agent-model=${OLLAMA_AGENT_MODEL:qwen3-coder:30b}
jarvis.ollama.fallback-agent-model=${OLLAMA_FALLBACK_AGENT_MODEL:gemma4:latest}
# Keep model loaded to avoid cold-start latency on each request.
spring.ai.ollama.chat.options.keep-alive=${OLLAMA_KEEP_ALIVE:30m}
# Bound response size for faster first responses.
spring.ai.ollama.chat.options.num-predict=${OLLAMA_NUM_PREDICT:512}
# Default provider for this profile
jarvis.ai.default-provider=OLLAMA
# Avoid repeated retries against remote Ollama when connectivity fails.
spring.ai.retry.enabled=false
spring.ai.retry.max-attempts=1

