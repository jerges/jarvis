# Anthropic-only profile
spring.autoconfigure.exclude=org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiImageAutoConfiguration,org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration,org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:${ANTHROPIC_OAUTH_TOKEN:}}
spring.ai.anthropic.chat.options.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
spring.ai.anthropic.chat.options.max-tokens=8096

jarvis.ai.default-provider=ANTHROPIC

