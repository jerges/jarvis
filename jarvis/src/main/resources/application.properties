spring.application.name=jarvis

# ── Anthropic (Claude) ─────────────────────────────────────────────────────────
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
spring.ai.anthropic.chat.options.max-tokens=8096

# ── Azure AI Foundry ───────────────────────────────────────────────────────────
# Credenciales: exporta las variables o rellena los valores directamente
spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY:}
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:}

# Nombres de deployment configurados en Azure AI Foundry (sobreescribibles por properties)
jarvis.azure.orchestrator-deployment=${AZURE_ORCHESTRATOR_DEPLOYMENT:gpt-4o}
jarvis.azure.agent-deployment=${AZURE_AGENT_DEPLOYMENT:gpt-4o-mini}

# ── Proveedor por defecto ──────────────────────────────────────────────────────
# Valores posibles: ANTHROPIC | AZURE
# Se puede sobrescribir por petición con el campo "provider" en el request JSON
jarvis.ai.default-provider=${JARVIS_DEFAULT_PROVIDER:ANTHROPIC}

