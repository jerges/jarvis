spring.application.name=jarvis
# ── Profiles ───────────────────────────────────────────────────────────────────
# Active profiles: anthropic | claude-cli | azure | ollama
# Additive profiles: github-mcp (add GitHub MCP tools to all agents)
spring.profiles.default=anthropic
# Prompt catalog root (classpath or filesystem path)
# jarvis.agents.prompts-root=classpath:agents
# ── Telegram Bot ───────────────────────────────────────────────────────────────
# 1. Habla con @BotFather en Telegram y crea un bot → te dará el token
# 2. Registra el webhook una vez el servidor sea públicamente accesible:
#    curl "https://api.telegram.org/bot<TOKEN>/setWebhook?url=https://<dominio>/webhook/telegram&secret_token=<SECRET>"
jarvis.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
# Token secreto para validar que el webhook viene de Telegram (recomendado)
jarvis.telegram.webhook-secret=${TELEGRAM_WEBHOOK_SECRET:}
# ── WhatsApp Cloud API (Meta) ──────────────────────────────────────────────────
# 1. Crea una app en https://developers.facebook.com
# 2. Añade el producto "WhatsApp" y registra un número de teléfono
# 3. Genera un token de sistema permanente en Meta Business Manager
# 4. En la sección Webhooks configura: URL=https://<dominio>/webhook/whatsapp
#    y el mismo verify_token que pongas aquí
jarvis.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
jarvis.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
# Token de verificación del webhook — lo defines tú al configurarlo en Meta
jarvis.whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:}
# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# ── MCP ────────────────────────────────────────────────────────────────────────
# MCP is disabled by default. Use the github-mcp profile to enable GitHub tools:
#   GITHUB_TOKEN=ghp_xxx java -jar jarvis.jar --spring.profiles.active=anthropic,github-mcp
# MCP clients are disabled unless a profile activates them
spring.ai.mcp.client.enabled=false
# ── Claude CLI (optional) ──────────────────────────────────────────────────────
# Only used with the claude-cli profile.
jarvis.claude-cli.command=${CLAUDE_CLI_COMMAND:claude}
jarvis.claude-cli.orchestrator-model=${CLAUDE_CLI_ORCHESTRATOR_MODEL:haiku}
jarvis.claude-cli.agent-model=${CLAUDE_CLI_AGENT_MODEL:haiku}
jarvis.claude-cli.timeout-seconds=${CLAUDE_CLI_TIMEOUT_SECONDS:180}
jarvis.claude-cli.working-directory=${CLAUDE_CLI_WORKING_DIRECTORY:${user.dir}}
# ── GitHub Copilot CLI ────────────────────────────────────────────────────────
jarvis.copilot.cli.path=${GH_CLI_PATH:/usr/local/bin/gh}
jarvis.copilot.github-token=${GH_TOKEN:}
# Google OAuth (Drive + Gmail)
jarvis.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
jarvis.google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
jarvis.google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/google/oauth/callback}
jarvis.google.oauth.scope-drive=${GOOGLE_OAUTH_SCOPE_DRIVE:https://www.googleapis.com/auth/drive.metadata.readonly}
jarvis.google.oauth.scope-gmail=${GOOGLE_OAUTH_SCOPE_GMAIL:https://www.googleapis.com/auth/gmail.readonly}
jarvis.google.oauth.scope-calendar=${GOOGLE_OAUTH_SCOPE_CALENDAR:https://www.googleapis.com/auth/calendar.readonly}
jarvis.google.context.max-calendar-events=${GOOGLE_CONTEXT_MAX_CALENDAR_EVENTS:5}
# true: one shared in-memory Google connection for all conversations
# false: one connection per conversationId
jarvis.google.oauth.shared-connection=${GOOGLE_OAUTH_SHARED_CONNECTION:true}
# Agent context enrichment from connected Google account
jarvis.google.context.enabled=${GOOGLE_CONTEXT_ENABLED:true}
jarvis.google.context.max-drive-files=${GOOGLE_CONTEXT_MAX_DRIVE_FILES:3}
jarvis.google.context.max-gmail-messages=${GOOGLE_CONTEXT_MAX_GMAIL_MESSAGES:3}

