# Azure OpenAI profile
spring.autoconfigure.exclude=org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY}
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}

jarvis.azure.orchestrator-deployment=${AZURE_ORCHESTRATOR_DEPLOYMENT:gpt-4o-mini}
jarvis.azure.agent-deployment=${AZURE_AGENT_DEPLOYMENT:gpt-35-turbo}
jarvis.ai.default-provider=AZURE

# Azure AI Search vector store (required when vector features are enabled)
spring.ai.vectorstore.azure.endpoint=${SPRING_AI_VECTORSTORE_AZURE_ENDPOINT}
spring.ai.vectorstore.azure.api-key=${SPRING_AI_VECTORSTORE_AZURE_API_KEY}
spring.ai.vectorstore.azure.index-name=${SPRING_AI_VECTORSTORE_AZURE_INDEX_NAME:jarvis-index}

