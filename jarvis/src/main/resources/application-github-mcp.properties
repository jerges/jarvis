# ── GitHub MCP Profile ────────────────────────────────────────────────────────
# Activate with: --spring.profiles.active=anthropic,github-mcp
# Requires: GITHUB_TOKEN env var with a GitHub personal access token
#           Node.js + npx installed on the system
#
# Token needs: repo, read:org, read:user scopes for full agent access.
#
# Example run:
#   GITHUB_TOKEN=ghp_xxx java -jar jarvis.jar \
#     --spring.profiles.active=anthropic,github-mcp

# Enable MCP client
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.initialized=true
spring.ai.mcp.client.request-timeout=30s

# Named stdio connection: GitHub MCP server via npx
spring.ai.mcp.client.stdio.connections.github.command=npx
spring.ai.mcp.client.stdio.connections.github.args=-y,@modelcontextprotocol/server-github
spring.ai.mcp.client.stdio.connections.github.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN:}
