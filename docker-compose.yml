services:

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  jarvis:
    build:
      context: ./jarvis
      dockerfile: Dockerfile
    container_name: jarvis-backend
    environment:
      SPRING_PROFILES_ACTIVE:         ${SPRING_PROFILES_ACTIVE:-anthropic}
      # AI Providers
      ANTHROPIC_API_KEY:            ${ANTHROPIC_API_KEY:-}
      AZURE_OPENAI_API_KEY:         ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT:        ${AZURE_OPENAI_ENDPOINT:-}
      SPRING_AI_VECTORSTORE_AZURE_ENDPOINT: ${SPRING_AI_VECTORSTORE_AZURE_ENDPOINT:-https://placeholder.search.windows.net}
      SPRING_AI_VECTORSTORE_AZURE_API_KEY:  ${SPRING_AI_VECTORSTORE_AZURE_API_KEY:-placeholder-key}
      SPRING_AI_VECTORSTORE_AZURE_INDEX_NAME: ${SPRING_AI_VECTORSTORE_AZURE_INDEX_NAME:-jarvis-index}
      AZURE_ORCHESTRATOR_DEPLOYMENT: ${AZURE_ORCHESTRATOR_DEPLOYMENT:-gpt-4o}
      AZURE_AGENT_DEPLOYMENT:       ${AZURE_AGENT_DEPLOYMENT:-gpt-4o-mini}
      OLLAMA_BASE_URL:             ${OLLAMA_BASE_URL:-http://192.168.1.44:11434}
      OLLAMA_MODEL:                ${OLLAMA_MODEL:-gemma4:latest}
      OLLAMA_ORCHESTRATOR_MODEL:   ${OLLAMA_ORCHESTRATOR_MODEL:-gemma4:latest}
      OLLAMA_AGENT_MODEL:          ${OLLAMA_AGENT_MODEL:-qwen3-coder:30b}
      OLLAMA_FALLBACK_AGENT_MODEL: ${OLLAMA_FALLBACK_AGENT_MODEL:-gemma4:latest}
      OLLAMA_KEEP_ALIVE:           ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PREDICT:          ${OLLAMA_NUM_PREDICT:-512}
      # Telegram
      TELEGRAM_BOT_TOKEN:           ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET:      ${TELEGRAM_WEBHOOK_SECRET:-}
      # WhatsApp
      WHATSAPP_ACCESS_TOKEN:        ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID:     ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN:        ${WHATSAPP_VERIFY_TOKEN:-}
    expose:
      - "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Spring Boot tarda más en arrancar en t3.micro
    networks:
      - jarvis-net

  # ── Frontend (Angular → nginx) ───────────────────────────────────────────────
  jarvis-ui:
    build:
      context: ./jarvis-ui
      dockerfile: Dockerfile
    container_name: jarvis-ui
    ports:
      - "80:80"
    depends_on:
      jarvis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jarvis-net

networks:
  jarvis-net:
    driver: bridge
